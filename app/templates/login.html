<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход · {{ app_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand-mark large">LM</div>
    <h1>License Monitor</h1>
    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
    <form method="post" action="/login" class="auth-form">
      <label>Логин<input name="username" autocomplete="username" required autofocus></label>
      <label>Пароль<input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">Войти</button>
    </form>
  </main>
</body>
</html>
